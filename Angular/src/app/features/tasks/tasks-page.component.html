<section class="panel">
  <h2>Tasks</h2>

  <button (click)="createTask()">Create Task</button>
  
  <table>
    <thead>
      <tr>
        <th>Done</th>
        <th>Title</th>
        <th>Due</th>
        <th>Priority</th>
      </tr>
    </thead>

    <tbody>
      <tr *ngFor="let task of tasks">
        <td>
          <input
          type="checkbox"
          [checked]="task.completed"
          (change)="toggleComplete(task)"
          />
        </td>

        <td>
          <a [routerLink]="['/tasks', task.id]">
            {{ task.title}}
          </a>
        </td>

        <td>{{ task.due_date | date: 'short' }}</td>
        <td>{{ task.priority }}</td>
        <td>
        <button class="delete-btn" (click)="deleteTask(task)">Delete</button>
        </td>
      </tr>
    </tbody>
  </table>
</section>
