<section class="panel" *ngIf="task() as t">
  <h2>{{ t.title }}</h2>

  <p class="lead">
    Due: {{ t.due_date | date:'short' }}<br>
    Priority: {{ t.priority }}
  </p>

  <button (click)="markComplete()" [disabled]="t.completed">{{ t.completed ? 'Completed' : 'Done' }}</button>
  <button (click)="editTask()">Edit Task</button>
  <button (click)="deleteTask()">Delete Task</button>

  <h3>Reminders</h3>

  <ul>
    <li *ngFor="let r of reminders()">
      {{ r.remind_at | date:'shortTime' }} ({{ r.delivery_method || 'popup' }})
      <button (click)="deleteReminder(r.id)">X</button>
    </li>
  </ul>

  <button (click)="addReminder()">Add Reminder</button>
</section>
